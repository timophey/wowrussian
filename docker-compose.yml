version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: wowrussian_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - wowrussian_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wowrussian_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      - redis
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - wowrussian_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wowrussian_celery
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-True}
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      - redis
      - backend
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    networks:
      - wowrussian_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wowrussian_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - wowrussian_network

volumes:
  redis_data:

networks:
  wowrussian_network:
    driver: bridge