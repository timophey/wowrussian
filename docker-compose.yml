version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: wowrussian_redis
    # Ports are not exposed to host - only accessible within Docker network
    # Uncomment if you need external access:
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - wowrussian_network

  # PostgreSQL Database (Recommended for production)
  postgres:
    image: postgres:15-alpine
    container_name: wowrussian_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-wowrussian}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wowrussian_password}
      - POSTGRES_DB=${POSTGRES_DB:-wowrussian}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Ports are not exposed to host - only accessible within Docker network
    # Uncomment if you need external access (e.g., for local development tools):
    # ports:
    #   - "5432:5432"
    networks:
      - wowrussian_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wowrussian}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MySQL/MariaDB Database (Alternative)
  mysql:
    image: mysql:8.0
    container_name: wowrussian_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-wowrussian}
      - MYSQL_USER=${MYSQL_USER:-wowrussian}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-wowrussian_password}
    volumes:
      - mysql_data:/var/lib/mysql
    # Ports are not exposed to host - only accessible within Docker network
    # Uncomment if you need external access (e.g., for local development tools):
    # ports:
    #   - "3306:3306"
    networks:
      - wowrussian_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wowrussian_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:8000"]}
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./dictionaries:/app/dictionaries
    depends_on:
      - redis
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - wowrussian_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wowrussian_celery
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-True}
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./dictionaries:/app/dictionaries
    depends_on:
      - redis
      - backend
      # Uncomment the database you want to use:
      - postgres
      # - mysql
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    networks:
      - wowrussian_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wowrussian_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - wowrussian_network

volumes:
  redis_data:
  postgres_data:
  mysql_data:
  dictionaries:

networks:
  wowrussian_network:
    driver: bridge